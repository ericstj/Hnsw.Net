name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Determine version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "arg=-p:Version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "arg=" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore
        run: dotnet restore Hnsw.Net.sln

      - name: Build
        run: dotnet build Hnsw.Net.sln -c Release --no-restore ${{ steps.ver.outputs.arg }}

      - name: Test
        run: dotnet test Hnsw.Net.sln -c Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack src/Hnsw.Net/Hnsw.Net.csproj -c Release --no-build -o artifacts ${{ steps.ver.outputs.arg }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nupkg
          path: artifacts/*

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          name: nupkg
          path: artifacts

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ericstj

      - name: Publish to NuGet.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
